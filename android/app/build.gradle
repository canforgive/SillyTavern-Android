apply plugin: 'com.android.application'

import groovy.json.JsonSlurper

def getPackageJson() {
    def inputFile = new File(projectDir, "../../package.json")
    def packageJson = new JsonSlurper().parseText(inputFile.text)
    return packageJson
}

def packageJson = getPackageJson()

// Task to generate a fixed debug keystore for consistent signing
task generateDebugKeystore {
    def keystoreFile = file("debug.keystore")

    doLast {
        if (keystoreFile.exists()) {
            return
        }
        println "Generating debug keystore: ${keystoreFile.absolutePath}"

        try {
            exec {
                commandLine "keytool", "-genkey", "-v",
                    "-keystore", keystoreFile.absolutePath,
                    "-alias", "androiddebugkey",
                    "-keyalg", "RSA", "-keysize", "2048",
                    "-validity", "36500",
                    "-storepass", "android",
                    "-keypass", "android",
                    "-dname", "CN=Android Debug,O=Android,C=US"
            }
        } catch (Exception e) {
            // If keytool is not available (e.g., no JDK), skip generation
            // The build will fall back to the default debug keystore
            println "keytool not available, using default debug keystore: ${e.message}"
            // Delete the file in case of partial creation
            if (keystoreFile.exists()) {
                keystoreFile.delete()
            }
        }
    }
}

preBuild.dependsOn generateDebugKeystore

android {
    namespace = "com.sillytavern.android"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.sillytavern.android"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Use GITHUB_RUN_NUMBER in CI (always increments), timestamp locally
        versionCode System.getenv("GITHUB_RUN_NUMBER") ?
            System.getenv("GITHUB_RUN_NUMBER").toInteger() :
            (int)(System.currentTimeMillis() / 1000)
        versionName packageJson.version
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            storeFile file(project.findProperty("RELEASE_STORE_FILE") ?: System.getenv("RELEASE_STORE_FILE") ?: "release-key.keystore")
            storePassword project.findProperty("RELEASE_STORE_PASSWORD") ?: System.getenv("RELEASE_STORE_PASSWORD")
            keyAlias project.findProperty("RELEASE_KEY_ALIAS") ?: System.getenv("RELEASE_KEY_ALIAS")
            keyPassword project.findProperty("RELEASE_KEY_PASSWORD") ?: System.getenv("RELEASE_KEY_PASSWORD")
        }
    }
    buildTypes {
        debug {
            if (signingConfigs.debug.storeFile.exists()) {
                signingConfig signingConfigs.debug
            }
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
    implementation "androidx.localbroadcastmanager:localbroadcastmanager:1.1.0"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
    implementation "com.squareup.okhttp3:okhttp-sse:4.12.0"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
